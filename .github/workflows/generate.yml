name: Generate Comet Animation


on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
-    uses: actions/checkout@v4

-    uses: actions/setup-node@v4
      with:
        node-version: 18

      - run: npm install

      - run: node src/index.js
        env:
          GITHUB_USERNAME: jayesh-04
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit SVG
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Update comet animation" || echo "No changes"
          git push